<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Wealthy — plan your taxes and retirement. Monte Carlo projections, withdrawal rates, RMDs, Social Security and healthcare.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Wealthy">

  <meta name="theme-color" content="#0F766E">
  <title>Wealthy</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background-color: #0b1220; color: #5eead4;
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column;
               align-items: center; justify-content: center; padding: 24px; text-align: center; }
    #loading .title { font-size: 20px; font-weight: 600; }
    #loading .msg { margin-top: 10px; font-size: 13px; color: #fca5a5; max-width: 480px;
                    white-space: pre-wrap; word-break: break-word; }
    #loading button { margin-top: 18px; background: #0f766e; color: #fff; border: none;
                      padding: 10px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    #loading .ver { margin-top: 18px; font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="title">Loading Wealthy…</div>
    <div class="msg" id="loading-msg"></div>
    <button id="loading-reload" style="display:none" onclick="wealthyHardReload()">Clear cache &amp; reload</button>
    <div class="ver">build __BUILD_ID__</div>
  </div>

  <script>
    window.WEALTHY_BUILD = "__BUILD_ID__";
    (function () {
      var msg = document.getElementById('loading-msg');
      var btn = document.getElementById('loading-reload');
      var lines = [];
      function show(text) {
        lines.push(text);
        if (msg) msg.textContent = lines.slice(-4).join('\n');
        if (btn) btn.style.display = 'inline-block';
      }
      window.__wealthyShow = show;

      // Self-heal: if a stale service worker is controlling this page, clear it
      // once and reload so we are not served an old broken app shell.
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller
          && !sessionStorage.getItem('wealthy_sw_cleared')) {
        sessionStorage.setItem('wealthy_sw_cleared', '1');
        Promise.all([
          navigator.serviceWorker.getRegistrations().then(function (rs) {
            return Promise.all(rs.map(function (r) { return r.unregister(); }));
          }),
          (window.caches && caches.keys) ? caches.keys().then(function (ks) {
            return Promise.all(ks.map(function (k) { return caches.delete(k); }));
          }) : Promise.resolve(),
        ]).then(function () { location.reload(); }, function () { location.reload(); });
      }

      // Surface real errors instead of an endless spinner.
      function reasonText(r) {
        if (!r) return 'unknown error';
        if (typeof r === 'string') return r;
        return (r.message || (r.toString && r.toString()) || 'unknown error');
      }
      window.addEventListener('error', function (e) { show('Error: ' + ((e && e.message) || 'load error')); });
      window.addEventListener('unhandledrejection', function (e) { show('Error: ' + reasonText(e && e.reason)); });
      var origErr = console.error;
      console.error = function () {
        try { show('Console: ' + Array.prototype.join.call(arguments, ' ')); } catch (_) {}
        origErr.apply(console, arguments);
      };

      function clearOverlay() { var el = document.getElementById('loading'); if (el) el.remove(); }
      window.addEventListener('flutter-first-frame', clearOverlay);
      document.addEventListener('flutter-first-frame', clearOverlay);

      setTimeout(function () {
        if (document.getElementById('loading') && lines.length === 0) {
          show('Still loading… if this persists, tap “Clear cache & reload”.');
        }
      }, 9000);
    })();

    function wealthyHardReload() {
      var done = function () { location.reload(); };
      try {
        sessionStorage.removeItem('wealthy_sw_cleared');
        var jobs = [];
        if ('serviceWorker' in navigator) {
          jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
            return Promise.all(rs.map(function (r) { return r.unregister(); }));
          }));
        }
        if (window.caches && caches.keys) {
          jobs.push(caches.keys().then(function (ks) {
            return Promise.all(ks.map(function (k) { return caches.delete(k); }));
          }));
        }
        Promise.all(jobs).then(done, done);
      } catch (e) { done(); }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
