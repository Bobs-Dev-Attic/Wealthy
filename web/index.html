<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Wealthy — plan your taxes and retirement. Monte Carlo projections, withdrawal rates, RMDs, Social Security and healthcare.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Wealthy">

  <meta name="theme-color" content="#0F766E">
  <title>Wealthy</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background-color: #0b1220; color: #5eead4;
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column;
               align-items: center; justify-content: center; padding: 24px; text-align: center; }
    #loading .title { font-size: 20px; font-weight: 600; }
    #loading .msg { margin-top: 10px; font-size: 13px; color: #94a3b8; max-width: 440px;
                    white-space: pre-wrap; word-break: break-word; }
    #loading button { margin-top: 18px; background: #0f766e; color: #fff; border: none;
                      padding: 10px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    #loading .ver { margin-top: 18px; font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="title">Loading Wealthy…</div>
    <div class="msg" id="loading-msg"></div>
    <button id="loading-reload" style="display:none" onclick="wealthyHardReload()">Clear cache &amp; reload</button>
    <div class="ver">build __BUILD_ID__</div>
  </div>

  <script>
    window.WEALTHY_BUILD = "__BUILD_ID__";
    (function () {
      var msg = document.getElementById('loading-msg');
      var btn = document.getElementById('loading-reload');
      function show(text) {
        if (msg) msg.textContent = text;
        if (btn) btn.style.display = 'inline-block';
      }
      // Surface any startup error instead of spinning forever.
      window.addEventListener('error', function (e) {
        show('Error: ' + ((e && e.message) || (e && e.type) || 'unknown'));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason;
        show('Error: ' + ((r && r.message) || r || 'promise rejection'));
      });
      // Flutter dispatches this on the document once the first frame paints.
      function clearOverlay() {
        var el = document.getElementById('loading');
        if (el) el.remove();
      }
      window.addEventListener('flutter-first-frame', clearOverlay);
      document.addEventListener('flutter-first-frame', clearOverlay);
      // Watchdog: if nothing painted after 9s, offer a cache-busting reload.
      setTimeout(function () {
        if (document.getElementById('loading')) {
          show('Still loading. If this persists, clear cache & reload.');
        }
      }, 9000);
    })();

    function wealthyHardReload() {
      var done = function () { location.reload(); };
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (rs) {
            rs.forEach(function (r) { r.unregister(); });
          });
        }
        if (window.caches && caches.keys) {
          caches.keys().then(function (ks) {
            return Promise.all(ks.map(function (k) { return caches.delete(k); }));
          }).then(done, done);
        } else { done(); }
      } catch (e) { done(); }
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
